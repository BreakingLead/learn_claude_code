<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bee Agent Builder</title>
    <link rel="stylesheet" href="/assets/app.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111318;
        color: #e6e9ef;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #111318;
      }

      .boot-screen {
        display: grid;
        min-height: 100vh;
        place-content: center;
        gap: 12px;
        padding: 24px;
        text-align: center;
      }

      .boot-title {
        font-size: 20px;
        font-weight: 700;
      }

      .boot-message {
        max-width: 620px;
        color: #aab2c0;
        font-size: 14px;
        line-height: 1.5;
      }

      .boot-error {
        max-width: 720px;
        border: 1px solid #5e4931;
        border-radius: 6px;
        padding: 10px;
        background: #211a14;
        color: #ffcc8a;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen" id="boot-screen">
        <div class="boot-title">Bee Agent Builder</div>
        <div class="boot-message">Loading the bundled node editor.</div>
      </div>
    </div>
    <script>
      (function () {
        function showBootError(message) {
          var boot = document.getElementById("boot-screen");
          if (!boot) return;
          var error = document.getElementById("boot-error");
          if (!error) {
            error = document.createElement("div");
            error.id = "boot-error";
            error.className = "boot-error";
            boot.appendChild(error);
          }
          error.textContent = message;
        }

        window.addEventListener("error", function (event) {
          showBootError("Frontend failed to start:\n" + (event.message || event.error || "unknown error"));
        });
        window.addEventListener("unhandledrejection", function (event) {
          var reason = event.reason && (event.reason.stack || event.reason.message || String(event.reason));
          showBootError("Frontend failed to start:\n" + (reason || "unhandled promise rejection"));
        });

        window.setTimeout(function () {
          if (document.getElementById("boot-screen")) {
            showBootError(
              "Frontend is still loading after 8s.\n" +
              "Run `pnpm --dir internal/agent/node_editor/webapp run build` and restart Bee Agent."
            );
          }
        }, 8000);
      })();
    </script>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
